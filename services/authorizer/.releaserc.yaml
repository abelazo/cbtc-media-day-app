---
branches:
  - main
tagFormat: "authorizer-v${version}"
plugins:
  - - "@semantic-release/commit-analyzer"
    - releaseRules:
        # Suppress all commits by default (must come first)
        - {breaking: true, release: false}
        - {type: feat, release: false}
        - {type: fix, release: false}
        - {type: perf, release: false}
        - {type: refactor, release: false}
        - {type: chore, release: false}
        - {type: docs, release: false}
        - {type: style, release: false}
        - {type: test, release: false}
        - {type: build, release: false}
        - {type: ci, release: false}
        # Allow only auth scoped commits (overrides suppression above)
        - {scope: auth, type: refactor, release: patch}
        - {scope: auth, type: perf, release: patch}
        - {scope: auth, type: fix, release: patch}
        - {scope: auth, type: feat, release: minor}
        - {scope: auth, breaking: true, release: major}
  - "@semantic-release/release-notes-generator"
  - "@semantic-release/github"
