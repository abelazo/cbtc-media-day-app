---
name: Terraform QA
description: >-
  Run Terraform QA checks: fmt, validate, tflint, checkov and trivy.

inputs:
  working-directory:
    description: Path to the Terraform module directory
    required: true
  terraform-version:
    description: Terraform version to install
    required: false
    default: "1.15.8"
  tflint-version:
    description: TFLint version to install
    required: false
    default: "v0.52.0"

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
      with:
        tflint_version: ${{ inputs.tflint-version }}
        cache: true

    - name: Install Just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: just init_no_backend

    - name: Terraform Format Check
      id: fmt
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      continue-on-error: true
      run: |
        log=$(mktemp)
        echo "log=$log" >> "$GITHUB_OUTPUT"
        just fmt 2>&1 | tee "$log"

    - name: Terraform Validate
      id: validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      continue-on-error: true
      run: |
        log=$(mktemp)
        echo "log=$log" >> "$GITHUB_OUTPUT"
        just validate 2>&1 | tee "$log"

    - name: Terraform TFLint
      id: tflint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      continue-on-error: true
      run: |
        log=$(mktemp)
        echo "log=$log" >> "$GITHUB_OUTPUT"
        just lint 2>&1 | tee "$log"

    - name: Install Checkov
      shell: bash
      run: pip install checkov

    - name: Checkov
      id: checkov
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      continue-on-error: true
      run: |
        log=$(mktemp)
        echo "log=$log" >> "$GITHUB_OUTPUT"
        just checkov 2>&1 | tee "$log"

    - name: QA Summary
      if: always()
      shell: bash
      run: |
        print_result() {
          name="$1"; outcome="$2"; log="$3"
          if [ "$outcome" = "success" ]; then
            echo "🟢 $name"
          else
            echo "🔴 $name"
            echo
            echo '```'
            cat "$log" 2>/dev/null
            echo '```'
          fi
          echo
        }
        {
          print_result "Terraform fmt" "${{ steps.fmt.outcome }}" "${{ steps.fmt.outputs.log }}"
          print_result "Terraform validate" "${{ steps.validate.outcome }}" "${{ steps.validate.outputs.log }}"
          print_result "Terraform tflint" "${{ steps.tflint.outcome }}" "${{ steps.tflint.outputs.log }}"
          print_result "Checkov" "${{ steps.checkov.outcome }}" "${{ steps.checkov.outputs.log }}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Enforce QA result
      if: always()
      shell: bash
      run: |
        for outcome in "${{ steps.fmt.outcome }}" "${{ steps.validate.outcome }}" "${{ steps.tflint.outcome }}" "${{ steps.checkov.outcome }}"; do
          if [ "$outcome" != "success" ]; then
            echo "One or more QA checks failed. See summary above."
            exit 1
          fi
        done
