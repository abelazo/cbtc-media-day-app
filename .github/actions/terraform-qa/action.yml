---
name: Terraform QA
description: >-
  Run Terraform QA checks: fmt, validate, tflint, checkov and trivy.

inputs:
  working-directory:
    description: Path to the Terraform module directory
    required: true
  terraform-version:
    description: Terraform version to install
    required: false
    default: "1.15.8"
  tflint-version:
    description: TFLint version to install
    required: false
    default: "v0.52.0"

runs:
  using: composite
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v6
      with:
        tflint_version: ${{ inputs.tflint-version }}
        cache: true

    - name: Install Just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: just init_no_backend

    - name: Terraform Format Check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: just fmt

    - name: Terraform Validate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: just validate

    - name: Terraform TFLint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: just lint

    - name: Install Checkov
      shell: bash
      run: pip install checkov

    - name: Checkov
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: just checkov
