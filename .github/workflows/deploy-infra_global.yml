---
name: "Deploy - Global"
run-name: >-
  ${{
    github.event_name == 'push'
    && github.event.head_commit.message
    || format('Manual deploy #{0}', github.run_number)
  }}

on:
  push:
    branches:
      - main
    paths:
      - 'infra/global/**'
      - '.github/workflows/deploy-infra_global.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa:
    name: QA Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Terraform QA
        uses: ./.github/actions/terraform-qa
        with:
          working-directory: infra/global

  release:
    name: Semantic Release
    needs: qa
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    defaults:
      run:
        working-directory: infra/global

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run semantic-release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx -y semantic-release@25
          NEW_TAG=$(git tag --points-at HEAD --list 'infra-global-v*' | head -n1)
          if [ -n "$NEW_TAG" ]; then
            echo "new_release_published=true" >> "$GITHUB_OUTPUT"
            echo "new_release_version=${NEW_TAG#infra-global-v}" >> "$GITHUB_OUTPUT"
          else
            echo "new_release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release Summary
        if: steps.release.outputs.new_release_published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="infra-global-v${{ steps.release.outputs.new_release_version }}"
          {
            echo "## 🚀 New Release: $TAG"
            echo
            echo "- **Version:** ${{ steps.release.outputs.new_release_version }}"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Release:** $(gh release view "$TAG" --json url -q .url)"
            echo
            echo "### Release Notes"
            gh release view "$TAG" --json body -q .body
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev:
    name: Deploy (dev)
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_deploy-infra_global-env.yml
    with:
      environment: dev
      release_version: infra-global-v${{ needs.release.outputs.new_release_version }}
    secrets: inherit

  deploy-prod:
    name: Deploy (prod)
    needs: [release, deploy-dev]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      id-token: write
      contents: write
    uses: ./.github/workflows/_deploy-infra_global-env.yml
    with:
      environment: prod
      release_version: infra-global-v${{ needs.release.outputs.new_release_version }}
    secrets: inherit
