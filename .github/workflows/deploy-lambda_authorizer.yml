---
name: "λ - Authorizer"
run-name: >-
  ${{
    github.event_name == 'push'
    && github.event.head_commit.message
    || format('Manual deploy #{0}', github.run_number)
  }}

on:
  push:
    branches:
      - main
    paths:
      - 'services/authorizer/**'
      - '.github/workflows/deploy-lambda_authorizer.yml'
      - '.github/workflows/template_tests-*.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform-qa:
    name: Terraform QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Terraform QA
        uses: ./.github/actions/terraform-qa
        with:
          working-directory: services/authorizer/infra

  code-qa:
    name: Code QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install dependencies
        run: just sync authorizer

      - name: Lint
        id: lint
        continue-on-error: true
        run: |
          log=$(mktemp)
          echo "log=$log" >> "$GITHUB_OUTPUT"
          just services::authorizer::lint 2>&1 | tee "$log"

      - name: Test
        id: test
        continue-on-error: true
        run: |
          log=$(mktemp)
          echo "log=$log" >> "$GITHUB_OUTPUT"
          just services::authorizer::test 2>&1 | tee "$log"

      - name: Build
        id: build
        continue-on-error: true
        run: |
          log=$(mktemp)
          echo "log=$log" >> "$GITHUB_OUTPUT"
          just services::authorizer::build 2>&1 | tee "$log"

      - name: QA Summary
        if: always()
        run: |
          print_result() {
            name="$1"; outcome="$2"; log="$3"
            if [ "$outcome" = "success" ]; then
              echo "🟢 $name"
            else
              echo "🔴 $name"
              echo
              echo '```'
              cat "$log" 2>/dev/null
              echo '```'
            fi
            echo
          }
          {
            print_result "Lint" "${{ steps.lint.outcome }}" "${{ steps.lint.outputs.log }}"
            print_result "Test" "${{ steps.test.outcome }}" "${{ steps.test.outputs.log }}"
            print_result "Build" "${{ steps.build.outcome }}" "${{ steps.build.outputs.log }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce QA result
        if: always()
        run: |
          for outcome in "${{ steps.lint.outcome }}" "${{ steps.test.outcome }}" "${{ steps.build.outcome }}"; do
            if [ "$outcome" != "success" ]; then
              echo "One or more QA checks failed. See summary above."
              exit 1
            fi
          done


